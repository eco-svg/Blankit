<!-- Community Posts card -->
<div class="card comms" id="sec-comms">

  <!-- DM lbar (toggled by nav DMs button) -->
  <div class="comm-dm-lbar" id="commDmLbar">
    <div class="comm-dm-lbar-header">
      <span class="comm-dm-lbar-title" id="dmCardTitle" data-i18n="card_dms">Messages</span>
      <div class="comm-dm-lbar-actions">
        <input type="text" id="dmUserSearch" placeholder="Search users..." autocomplete="off" class="dm-inline-search hidden">
        <button class="icon-btn" id="newDmBtn" title="New message">+</button>
        <button class="icon-btn" id="cancelNewDmBtn" title="Cancel" style="display:none;">✕</button>
      </div>
    </div>
    <div id="dmUserResults" class="dm-inline-results hidden"></div>
    <div class="comm-dm-lbar-body">
      <div id="dmConvList" class="dm-conv-list"></div>
      <div id="dmChatView" class="dm-chat-view hidden">
        <div class="dm-chat-header">
          <button id="dmBackBtn" class="icon-btn" title="Back">←</button>
          <div class="dm-chat-header-body">
            <span id="dmChatName" class="dm-chat-name"></span>
            <span id="dmChatStatus" class="dm-chat-status"></span>
          </div>
        </div>
        <div id="dmMessages" class="dm-messages"></div>
        <div class="dm-input-row">
          <button class="dm-attach-btn" id="dmAttachBtn" title="Attach file">📎</button>
          <input type="file" id="dmFileInput" accept="image/*,video/*,audio/*" style="display:none;">
          <button class="dm-voice-btn" id="dmVoiceBtn" title="Voice message">🎙</button>
          <span class="dm-voice-timer" id="dmVoiceTimer">0:00</span>
          <input type="text" id="dmInput" placeholder="Message..." autocomplete="off">
          <button id="dmSendBtn">→</button>
        </div>
        <div id="dmUploadProgress" class="upload-progress hidden"><div class="upload-progress-bar" id="dmProgressBar"></div></div>
        <div id="dmMediaPreview" class="dm-media-preview hidden"></div>
      </div>
    </div>
  </div>

  <!-- Main community content -->
  <div class="comm-main">
    <div class="card-top-bar">
      <div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;" id="commTitleBlock">
        <div style="display:flex;align-items:center;gap:10px;">
          <h2 class="card-title" data-i18n="card_comms">Community Posts</h2>
          <div class="comm-feed-mode-bar">
            <button class="comm-mode-btn active" data-mode="radar">📍 Radar</button>
            <button class="comm-mode-btn" data-mode="global">🌐 Global</button>
          </div>
        </div>
        <span class="comm-field-label" id="commRangeLabel">📍 radar</span>
      </div>
      <button class="icon-btn" id="commComposeBtn" title="New post">+</button>
      <button class="icon-btn" id="cancelCommPostBtn" title="Cancel" style="display:none;">✕</button>
    </div>

    <!-- Inline compose pane -->
    <div id="commInlineCompose" class="comm-inline-compose hidden">
      <div class="comm-modal-tabs">
        <button class="comm-modal-tab active" id="commTabWrite">✏ Write</button>
        <button class="comm-modal-tab" id="commTabQuick">⚡ Quick</button>
      </div>
      <div style="font-size:0.68rem;font-family:var(--font-mono);color:var(--text-dim);letter-spacing:0.08em;margin-top:10px;margin-bottom:4px;">POST TYPE</div>
      <div class="comm-type-pills" id="commTypePills">
        <button class="comm-type-pill" data-type="blog">Blog</button>
        <button class="comm-type-pill" data-type="showoff">ShowOff</button>
      </div>
      <div id="commWritePane" style="margin-top:10px;">
        <div id="commModalInput" class="comm-modal-textarea" contenteditable="true" data-placeholder="What's on your mind..."></div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
          <label class="dm-attach-btn" id="commAttachLabel" title="Attach media" style="cursor:pointer;font-size:1.0rem;">📎
            <input type="file" id="commFileInput" accept="image/*,video/*,audio/*" style="display:none;">
          </label>
          <span class="comm-char-count" id="commModalCharCount" style="flex:1;">0 / 500</span>
        </div>
        <div id="commUploadProgress" class="upload-progress hidden" style="margin-top:6px;"><div class="upload-progress-bar" id="commProgressBar"></div></div>
        <div id="commModalMediaPreview" class="dm-media-preview hidden" style="margin-top:8px;"></div>
      </div>
      <div id="commQuickPane" class="hidden" style="margin-top:10px;">
        <label class="comm-quick-zone" id="commQuickZone">
          <input type="file" id="commQuickFileInput" accept="image/*,video/*,audio/*" style="display:none;">
          <div id="commQuickPlaceholder">
            <div style="font-size:2.8rem;line-height:1;margin-bottom:10px;">📷</div>
            <div style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-dim);letter-spacing:0.06em;">Photo · Video · Audio</div>
            <div style="font-size:0.68rem;color:var(--text-dim);opacity:0.5;margin-top:4px;">tap to choose</div>
          </div>
          <div id="commQuickPreview" class="hidden"></div>
        </label>
        <div id="commQuickProgress" class="upload-progress hidden" style="margin-top:8px;"><div class="upload-progress-bar" id="commQuickProgressBar"></div></div>
        <input type="text" id="commQuickCaption" class="comm-quick-caption" placeholder="Caption (optional)..." maxlength="150" autocomplete="off">
        <span class="comm-char-count" id="commQuickCaptionCount">0 / 150</span>
      </div>
      <div id="commModalError" style="color:#e87a5a;font-size:0.78rem;min-height:1em;margin-top:8px;"></div>
      <div class="modal-actions" style="margin-top:12px;">
        <button id="confirmCommPostBtn" class="nav-pill" style="background:var(--accent);color:#111;border-color:var(--accent);">Post</button>
      </div>
    </div>

    <!-- Feed -->
    <div class="comm-feed" id="commFeed"></div>
  </div>

</div>
