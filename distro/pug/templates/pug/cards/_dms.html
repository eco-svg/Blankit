<!-- Direct Messages card — standalone tab, lives beside Notes.
     (Was previously a slide-out drawer inside the Community card.) -->
<div class="card dms" id="sec-dms">
  <div class="comm-dm-lbar-header">
    <span class="comm-dm-lbar-title" id="dmCardTitle" data-i18n="card_dms">Messages</span>
    <div class="comm-dm-lbar-actions">
      <input type="text" id="dmUserSearch" placeholder="Search users..." autocomplete="off" class="dm-inline-search hidden">
      <button class="icon-btn" id="newDmBtn" title="New message">+</button>
      <button class="icon-btn" id="cancelNewDmBtn" title="Cancel" style="display:none;">✕</button>
    </div>
  </div>
  <div id="dmUserResults" class="dm-inline-results hidden"></div>
  <div class="comm-dm-lbar-body">
    <div id="dmConvList" class="dm-conv-list"></div>
    <div id="dmChatView" class="dm-chat-view hidden">
      <div class="dm-chat-header">
        <button id="dmBackBtn" class="icon-btn" title="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="dm-chat-header-body">
          <span id="dmChatName" class="dm-chat-name"></span>
          <span id="dmChatStatus" class="dm-chat-status"></span>
        </div>
        <button id="dmReportBtn" class="icon-btn" title="Report user" style="margin-left:auto;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        </button>
        <button id="dmBlockBtn" class="icon-btn" title="Block user">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </button>
      </div>
      <div id="dmMessages" class="dm-messages"></div>
      <div class="dm-input-row">
        <button class="dm-attach-btn" id="dmAttachBtn" title="Attach file">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="dmFileInput" accept="image/*,video/*,audio/*" style="display:none;">
        <button class="dm-voice-btn" id="dmVoiceBtn" title="Voice message">
          <svg id="dmVoiceIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        </button>
        <span class="dm-voice-timer" id="dmVoiceTimer">0:00</span>
        <input type="text" id="dmInput" placeholder="Message..." autocomplete="off">
        <button id="dmSendBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
      <div id="dmUploadProgress" class="upload-progress hidden"><div class="upload-progress-bar" id="dmProgressBar"></div></div>
      <div id="dmMediaPreview" class="dm-media-preview hidden"></div>
    </div>
  </div>
</div>
