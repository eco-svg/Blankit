<!-- Habit Pulse — mobile only, shown above habits card in habits tab -->
<div class="habit-pulse-section page-hidden" id="sec-habit-pulse">
  <div class="habit-pulse-label">Habit Pulse</div>
  <div class="habit-pulse-chart-wrap">
    <canvas id="consistencyChartMobile"></canvas>
  </div>
</div>

<!-- Habits card — desktop: flat two-column (tracker + pulse); mobile: single panel -->
<div class="card habits-card full-row" id="sec-habits">
  <div class="habits-inner">
    <div class="habit-face habit-front" id="habitFaceFront">

      <!-- Left: combined tracker (desktop) / manage panel (mobile) -->
      <div class="habit-panel habit-panel-front">
        <div class="habit-panel-header">
          <span class="card-title" data-i18n="card_habits">Habits</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <!-- Desktop: round + trigger -->
            <button class="habit-desk-only" id="habitAddTrigger" title="Add habit">+</button>
            <!-- Mobile: flip to today panel -->
            <button class="habit-mob-only" id="habitFlipBtn">Today →</button>
          </div>
        </div>
        <!-- Add row: desktop = hidden until + clicked; mobile = always visible -->
        <div class="habit-add-row" id="habitAddRow">
          <input type="text" id="habitNameInput" placeholder="New habit..." maxlength="80" autocomplete="off">
          <button id="habitAddBtn">Add</button>
          <button class="habit-add-cancel habit-desk-only" id="habitAddCancel" title="Cancel">✕</button>
        </div>
        <ul class="habit-manage-list" id="habitManageList"></ul>
        <!-- Progress footer: desktop shows here, mobile shows in today-col -->
        <div class="habit-today-footer" id="habitTodayFooter"></div>
      </div>

      <div class="habit-divider"></div>

      <!-- Right: pulse chart (desktop) / today panel (mobile) -->
      <div class="habit-panel habit-panel-back">

        <!-- Desktop: pulse chart — always visible on right -->
        <div class="habit-pulse-col">
          <div class="habit-panel-header">
            <span class="card-title">Habit Pulse</span>
            <span class="habit-pulse-range-label">Last 4 weeks</span>
          </div>
          <div class="habit-pulse-chart-area">
            <canvas id="consistencyChart"></canvas>
          </div>
        </div>

        <!-- Mobile: today panel — shown on flip back face -->
        <div class="habit-today-col">
          <div class="habit-panel-header">
            <span class="card-title">Today</span>
            <button class="habit-mob-only" id="habitFlipBackBtn">← Back</button>
            <span class="habit-today-date" id="habitTodayDate"></span>
          </div>
          <ul class="habit-today-list" id="habitTodayList"></ul>
          <div class="habit-today-footer" id="habitMobFooter"></div>
        </div>

      </div>

    </div>
  </div>
</div>
