<!-- Notes / Diary card -->
<div class="card notes" id="sec-notes">
  <div class="card-top-bar">
    <h2 class="card-title" data-i18n="card_notes">Notes / Diary</h2>
    <span class="enc-badge" title="Your notes are end-to-end encrypted and stored only for you">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      encrypted
    </span>
  </div>
  <div class="notes-view-list" id="notesListScreen">
    <div class="list-header">
      <h3 data-i18n="notes_your_flows">Your Flows</h3>
      <button class="icon-btn" id="newNoteBtn" title="Start New Flow">+</button>
    </div>
    <div class="note-items-container" id="noteItemsContainer"></div>
  </div>
  <div class="notes-view-editor hidden" id="notesEditorScreen">
    <div class="editor-top-bar">
      <button class="icon-btn back-btn" id="backToListBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div style="display:flex;align-items:center;gap:15px;">
        <span id="saveStatus" class="save-status">Saved</span>
        <button class="icon-btn" id="deleteNoteBtn" style="color:#c85a2a;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>
    </div>
    <div class="editor-header">
      <input type="text" id="noteTitle" placeholder="Entry Title..." data-i18n-ph="notes_title_ph" autocomplete="off" spellcheck="false">
    </div>
    <div id="noteBody" class="infinite-canvas" contenteditable="true" data-placeholder="Start your flow (Text, Image, Video)..." data-i18n-dp="notes_body_ph"></div>
    <div class="editor-media-actions">
      <input type="date" id="noteDateInput" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:4px;outline:none;font-family:var(--font-mono);font-size:0.8rem;margin-right:10px;cursor:pointer;">
      <label class="media-btn" style="cursor:pointer;overflow:hidden;position:relative;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <input type="file" id="imageInput" accept="image/*" style="opacity:0;position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer;">
      </label>
      <label class="media-btn" style="cursor:pointer;overflow:hidden;position:relative;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <input type="file" id="videoInput" accept="video/mp4,video/webm" style="opacity:0;position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer;">
      </label>
    </div>
  </div>
</div>

<!-- Quick Ask moved into the right sidebar (toggled via #rQaToggle, see _sidebar.html).
     The freed column slot on the notes tab is now filled by the DM card
     (cards/_dms.html), shown alongside Notes via the 'notes' route in router.js. -->
