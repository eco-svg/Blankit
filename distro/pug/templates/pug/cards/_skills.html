<!-- Skills / Achievements flip card -->
<div class="skills-wrap page-hidden" id="sec-skills-wrapper">
  <div class="skills-flip-inner" id="skillsFlipInner">

    <div class="card skills-main" id="sec-skills">
      <div class="card-top-bar">
        <h2 class="card-title" data-i18n="card_skills">Skills</h2>
        <button class="skills-flip-btn" id="skillsFlipBtn">Achievements →</button>
      </div>
      <div class="skills-main-list" id="skillsMainList">
        <div class="skill-loading" style="margin-top:30px;" data-i18n="skills_empty">Open STATS to generate your skill sheet.</div>
      </div>
    </div>

    <div class="card achievements-main" id="sec-achievements">
      <div class="card-top-bar">
        <div style="flex:1;min-width:0;">
          <h2 class="card-title" data-i18n="card_work">Achievements</h2>
          <p class="ach-soon-notice">Verification &amp; ranking coming soon — add your work now, ranks unlock when it ships.</p>
        </div>
        <button class="skills-flip-btn" id="skillsFlipBackBtn">← Skills</button>
        <button class="icon-btn" id="newAchievementBtn" title="Add achievement">+</button>
      </div>
      <div class="achievements-list" id="achievementsList">
        <div class="skill-loading" style="margin-top:30px;opacity:0.45;">Shipped projects. Competitive results. Measurable output.<br><span style="font-size:0.75em;opacity:0.7;">Not habits — real, verifiable work only.</span></div>
      </div>
    </div>

  </div>
</div>
