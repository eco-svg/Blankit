<!-- _sidebar.html — the right sidebar: event calendar, BlinkBot card, and the goals widget. -->
<aside class="r-bar">

  <!-- 0. Clock / date / weather + Stats — moved here from the header so it sits in
       the rbar instead of overflowing the top bar. -->
  <div class="clock-widget stats-integrated">
    <div class="cw-info">
      <div class="cw-row">
        <span class="cw-time" id="cwTime">00:00</span>
        <span class="cw-sep">|</span>
        <span class="cw-weather" id="cwWeather">☀️ --°</span>
      </div>
      <div class="cw-row">
        <span class="cw-date" id="cwDate">Jan 1</span>
        <span class="cw-sep">|</span>
        <span class="cw-day" id="cwDay">Monday</span>
      </div>
    </div>
    <button id="statsBtn" class="stats-btn-inner">
      <span class="stats-label" data-i18n="header_stats">STATS</span>
      <div class="stats-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
      </div>
    </button>
  </div>

  <!-- 1. Calendar — always first -->
  <div class="r-card calender" id="calendarCard">
    <div class="r-card-header" data-i18n="sidebar_event_calendar">Event Calendar</div>
    <div class="calendar-header">
      <button id="prevMonth">&lt;</button>
      <span id="monthDisplay">Month Year</span>
      <button id="nextMonth">&gt;</button>
    </div>
    <div class="calendar-weekdays">
      <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
    </div>
    <div class="calendar-days" id="calendarDays"></div>
  </div>

  <!-- 2. BlinkBot — on-device AI automator (wllama, freemium) -->
  <div class="r-card r-blinkbot-soon" id="rGroqCard" role="button" tabindex="0">
    <div class="r-blinkbot-soon-inner">
      <div class="r-blinkbot-soon-name">BlinkBot</div>
      <div class="r-blinkbot-soon-badge" id="blinkCardBadge">Free · 5 mo</div>
      <div class="r-blinkbot-soon-sub" id="blinkCardSub">On-device AI Automator</div>
      <!-- Before install: download. After: inline automator input (mic + text), no chat panel. -->
      <button class="r-blinkbot-dl-btn" id="blinkCardBtn" type="button">Download</button>
      <div class="r-blinkbot-io hidden" id="blinkCardIO">
        <button class="r-blinkbot-mic" id="blinkCardMic" type="button" title="Speak" aria-label="Speak"></button>
        <input type="text" id="blinkCardInput" placeholder="Tell BlinkBot what you did…" autocomplete="off">
        <button class="r-blinkbot-send" id="blinkCardSend" type="button" aria-label="Send" title="Send">&#8594;</button>
      </div>
    </div>
  </div>

  <!-- 3. Goals card — flippable (front=active, back=finished/cancelled) -->
  <div class="r-card r-goals-card goal-flip-card">
    <div class="goal-flip-inner" id="goalFlipInner">

      <!-- Front: active goals -->
      <div class="goal-face goal-front">
        <div class="r-card-header">
          <span data-i18n="sidebar_goals">To-do</span>
          <button class="goal-flip-btn" id="goalFlipBtn">Done ↩</button>
        </div>
        <div class="r-goals-sections">
          <div class="r-goals-list" id="rActiveGoalsList"></div>
        </div>
        <div class="r-goal-input-row">
          <input type="text" id="rNewGoalInput" placeholder="New to-do…" data-i18n-ph="sidebar_new_goal_ph" autocomplete="off">
          <button id="rAddGoalBtn">+</button>
        </div>
      </div>

      <!-- Back: finished / cancelled -->
      <div class="goal-face goal-back">
        <div class="r-card-header">
          <button class="goal-flip-btn" id="goalFlipBackBtn">← To-do</button>
        </div>
        <div class="r-done-cols">
          <div class="r-done-col">
            <div class="r-done-label" style="color:var(--green);" data-i18n="sidebar_finished">Finished</div>
            <div id="rFinishedList" class="r-done-list"></div>
          </div>
          <div class="r-done-col">
            <div class="r-done-label" style="color:var(--text-dim);" data-i18n="sidebar_cancelled">Cancelled</div>
            <div id="rCancelledList" class="r-done-list"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</aside>
<div class="rbar-backdrop" id="rBarBackdrop"></div>
