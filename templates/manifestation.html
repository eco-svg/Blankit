<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Habit Tracker - Manifest Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #764ba2; --bg: #f4f7f6; --accent: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #666; text-decoration: none; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .manifest-card { background: #fdf2ff; padding: 25px; border-radius: 15px; border: 1px dashed var(--primary); }
        .suggestion-item { background: white; padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin:0;">Habit Tracker - Manifest </h1>
            <a href="/logout" style="color:var(--accent); text-decoration:none; font-weight:bold;">Logout</a>
        </div>

        <div class="tabs">
            <a href="/dashboard" class="tab-btn">Tracker</a>
            <a href="/manifestation" class="tab-btn active">Manifest</a>
        </div>

        <div class="manifest-card">
            <h2 style="margin-top:0;">Just Set It </h2>
            <p>Tell the AI your big goal and we will manifest a daily blueprint for you.</p>
            <div style="display:flex; gap:10px;">
                <input type="text" id="goal-input" placeholder="e.g. Master Python, Healthier Lifestyle" style="flex:1; padding:12px; border-radius:8px; border:1px solid #ddd;">
                <button onclick="generateHabits()" class="add-btn" style="background:black;">Generate Blueprint</button>
            </div>
        </div>

        <div id="suggestion-box" style="margin-top:25px; display:none;">
            <h3>AI Blueprint for you:</h3>
            <div id="suggestion-list"></div>
        </div>
    </div>

    <script>
        function generateHabits() {
            const goal = document.getElementById('goal-input').value;
            const container = document.getElementById('suggestion-list');
            container.innerHTML = "<p>Manifesting your success... please wait...</p>";
            document.getElementById('suggestion-box').style.display = 'block';

            const params = new URLSearchParams();
            params.append('goal', goal);

            fetch('/manifest_habits', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: params
            })
            .then(r => r.json())
            .then(data => {
                container.innerHTML = "";
                data.habits.forEach(h => {
                    const div = document.createElement('div');
                    div.className = "suggestion-item";
                    div.innerHTML = `<span><strong>${h}</strong></span> <button onclick="quickAdd('${h}')" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Add to Tracker</button>`;
                    container.appendChild(div);
                });
            });
        }

        function quickAdd(name) {
            const params = new URLSearchParams();
            params.append('habit_name', name);

            fetch('/add_habit', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: params
            }).then(() => {
                alert("Slay! Habit added to your tracker.");
                window.location.href = "/dashboard";
            });
        }
    </script>
</body>
</html>
