      <p class="auth-sub">Sign in to continue your streak</p>

      <div class="auth-card">
        <div class="tabs">
          <button class="tab active" data-tab="login">Sign in</button>
          <button class="tab" data-tab="register">Create account</button>
          <button class="tab" data-tab="forgot">Forgot</button>
          <div class="tab-line" id="tabLine"></div>
        </div>

        <!-- LOGIN -->
        <div class="panel active" id="panel-login">
          <div class="method-row">
            <button class="method-btn active" data-method="email">email</button>
            <span class="sep">·</span>
            <button class="method-btn" data-method="username">username</button>
          </div>
          <div class="field">
            <label class="field-label" id="loginIdentifierLabel">Email address</label>
            <input class="field-input" type="email" id="loginIdentifier"
                   placeholder="you@example.com" autocomplete="email"/>
            <span class="field-err" id="loginIdentifierErr"></span>
          </div>
          <div class="field">
            <label class="field-label">Password</label>
            <div class="input-row">
              <input class="field-input" type="password" id="loginPassword"
                     placeholder="••••••••" autocomplete="current-password"/>
              <button class="eye-btn" data-target="loginPassword">show</button>
            </div>
            <span class="field-err" id="loginPasswordErr"></span>
          </div>
          <div class="field-row">
            <label class="check-label">
              <input type="checkbox" id="rememberMe"/> Keep me signed in
            </label>
            <button class="link-btn" data-tab="forgot">Forgot password?</button>
          </div>
          <button class="submit-btn" id="loginBtn">
            Sign in to <span class="btn-distro" id="loginDistroLabel">ecosvg</span>
            <span class="btn-loader hidden" id="loginLoader"></span>
          </button>
          <div class="flash hidden" id="loginFlash"></div>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">
          <div class="field">
            <label class="field-label">Username</label>
            <input class="field-input" type="text" id="regUsername"
                   placeholder="your_handle" autocomplete="username"/>
            <span class="field-err" id="regUsernameErr"></span>
          </div>
          <div class="field">
            <label class="field-label">Email address</label>
            <input class="field-input" type="email" id="regEmail"
                   placeholder="you@example.com" autocomplete="email"/>
            <span class="field-err" id="regEmailErr"></span>
          </div>
          <div class="field">
            <label class="field-label">Password</label>
            <div class="input-row">
              <input class="field-input" type="password" id="regPassword"
                     placeholder="min 8 characters" autocomplete="new-password"/>
              <button class="eye-btn" data-target="regPassword">show</button>
            </div>
            <div class="strength-row">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span class="strength-label" id="strengthLabel">—</span>
            </div>
            <span class="field-err" id="regPasswordErr"></span>
          </div>
          <div class="field">
            <label class="field-label">Confirm password</label>
            <div class="input-row">
              <input class="field-input" type="password" id="regConfirm"
                     placeholder="••••••••" autocomplete="new-password"/>
              <button class="eye-btn" data-target="regConfirm">show</button>
            </div>
            <span class="field-err" id="regConfirmErr"></span>
          </div>
          <button class="submit-btn" id="registerBtn">
            Create account
            <span class="btn-loader hidden" id="registerLoader"></span>
          </button>
          <div class="flash hidden" id="registerFlash"></div>
        </div>

        <!-- FORGOT -->
        <div class="panel" id="panel-forgot">
          <div class="field">
            <label class="field-label">Email address</label>
            <input class="field-input" type="email" id="forgotEmail"
                   placeholder="you@example.com" autocomplete="email"/>
            <span class="field-err" id="forgotEmailErr"></span>
          </div>
          <button class="submit-btn" id="forgotBtn">
            Send reset link
            <span class="btn-loader hidden" id="forgotLoader"></span>
          </button>
          <div class="flash hidden" id="forgotFlash"></div>
          <button class="link-btn back" data-tab="login">← Back to sign in</button>
        </div>

      </div>
    </section>

  </main>

  <div class="locked-bar hidden" id="lockedBar">
    Signed in as <strong id="lockedName">ecosvg</strong> — distro switching disabled.
  </div>

  <script src="{{ url_for('static', filename='shared/login.js') }}"></script>
</body>
</html>
