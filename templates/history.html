<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit History</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #bb86fc; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .date { color: var(--accent); font-size: 0.9rem; font-weight: bold; }
        .note { color: #888; font-style: italic; }
        .points { background: #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        nav { margin-bottom: 30px; }
        nav a { text-decoration: none; margin-right: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/dashboard" style="color: #888;">Back to Dashboard</a>
            <span style="color: var(--accent); font-weight: bold;">History Log</span>
        </nav>

        <h2>Your Past Progress</h2>

        {% if not logs %}
            <p style="color: #555;">No history found. Go slay some habits first.</p>
        {% endif %}

        {% for log in logs %}
        <div class="card">
            <div>
                <div class="date">{{ log.date }}</div>
                <div class="note">"{{ log.note }}"</div>
            </div>
            <div class="points">{{ log.points }} Tasks</div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
