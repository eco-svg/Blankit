<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLANKIT | Welcome</title>
    <script src="/static/animations.js"></script>
    <style>
        :root { 
            --primary: #764ba2; 
            --accent: #667eea; 
            --text-main: #2d3436; 
            --glass: rgba(255, 255, 255, 0.95);
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-main);
        }

        .auth-card { 
            background: var(--glass); 
            padding: 3.5rem 2.5rem; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.25); 
            width: 100%;
            max-width: 400px; 
            text-align: center; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .welcome-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .brand-highlight {
            font-weight: 900;
            letter-spacing: -1.5px;
            display: block;
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #764ba2, #667eea);
            /* FIXED CSS WARNING BELOW */
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #edf2f7; 
            border-radius: 14px; 
            box-sizing: border-box; 
            font-size: 1rem;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--primary); 
            outline: none;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 12px 25px rgba(118, 75, 162, 0.4);
        }

        .toggle-link { 
            margin-top: 25px; 
            color: #636e72; 
            cursor: pointer; 
            font-size: 0.95rem; 
            display: inline-block;
        }

        .toggle-link strong { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-card" id="auth-container">
        <div class="welcome-title">Welcome back to</div>
        <div class="brand-highlight">BLANKIT</div>
        
        <div id="login-form">
            <form action="/login" method="POST">
                <input type="email" name="email" placeholder="Gmail Address" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Enter Workspace</button>
            </form>
            <span class="toggle-link" onclick="toggleView()">
                New here? <strong>Create an account</strong>
            </span>
        </div>

        <div id="signup-form" class="hidden">
            <form action="/signup" method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Gmail Address" required>
                <input type="password" name="password" placeholder="Create Password" required>
                <button type="submit">Join the Movement</button>
            </form>
            <span class="toggle-link" onclick="toggleView()">
                Already a member? <strong>Sign in</strong>
            </span>
        </div>
    </div>

    <script>
        function toggleView() {
            // Safety check: if animations.js didn't load, just flip the classes manually
            if (window.UI && window.UI.toggleAuth) {
                UI.toggleAuth('login-form', 'signup-form', 'auth-container');
            } else {
                document.getElementById('login-form').classList.toggle('hidden');
                document.getElementById('signup-form').classList.toggle('hidden');
            }
        }
    </script>
</body>
</html>
